<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portail Analyse — Criminalité × Immigration en France</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sidebar-w: 230px;
  --header-h: 48px;
  --bg: #f4f5f7;
  --sidebar-bg: #1c2333;
  --sidebar-hover: #2a3447;
  --sidebar-active: #3b5bdb;
  --header-bg: #ffffff;
  --txt: #1a1a2e;
  --muted: #8a8fa8;
  --border: #e2e4ea;
  --group-label: #5a6078;
  --tag-bg: #eef2ff;
  --tag-txt: #3b5bdb;
}
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); }
.shell { display: flex; flex-direction: column; height: 100vh; }

/* HEADER */
.header {
  height: var(--header-h); background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 18px; gap: 14px;
  flex-shrink: 0; box-shadow: 0 1px 3px rgba(0,0,0,.06);
}
.header-logo { font-size: 15px; font-weight: 700; color: var(--txt); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.header-sep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; }
.header-crumb { font-size: 13px; color: var(--muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.header-crumb strong { color: var(--txt); font-weight: 600; }
.header-count { padding: 3px 10px; border-radius: 4px; background: var(--tag-bg); color: var(--tag-txt); font-size: 12px; font-weight: 600; white-space: nowrap; }

.body { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w); background: var(--sidebar-bg); color: #c8cfe0;
  display: flex; flex-direction: column; flex-shrink: 0;
  overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin; scrollbar-color: #3a4255 transparent;
}
.sidebar-title {
  padding: 14px 14px 6px; font-size: 10px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase; color: #4a5270;
}
.nav-group { margin-bottom: 6px; }
.nav-group-label {
  padding: 10px 14px 3px; font-size: 10px; font-weight: 700;
  color: var(--group-label); text-transform: uppercase; letter-spacing: .8px;
}
.nav-item {
  width: 100%; background: none; border: none; color: #b0b8d0; cursor: pointer;
  padding: 9px 14px; text-align: left; display: flex; align-items: center; gap: 9px;
  transition: background .12s, color .12s;
}
.nav-item:hover { background: var(--sidebar-hover); color: #fff; }
.nav-item.active { background: var(--sidebar-active); color: #fff; font-weight: 600; }
.nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-text { font-size: 13px; line-height: 1.3; }
.sidebar-footer {
  margin-top: auto; padding: 12px 14px; font-size: 11px;
  color: #404860; border-top: 1px solid #263047; line-height: 1.6;
}

/* CONTENT */
.content { flex: 1; overflow: hidden; position: relative; background: #fff; }
.frame-wrap { position: absolute; inset: 0; }
iframe { width: 100%; height: 100%; border: none; display: block; }

/* LOADING OVERLAY */
.overlay {
  position: absolute; inset: 0; background: rgba(244,245,247,.92);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; z-index: 10; transition: opacity .25s;
  pointer-events: none; opacity: 0;
}
.overlay.visible { opacity: 1; pointer-events: all; }
.overlay-icon { font-size: 40px; }
.overlay-title { font-size: 18px; font-weight: 700; color: var(--txt); }
.overlay-desc { font-size: 13px; color: var(--muted); max-width: 340px; text-align: center; line-height: 1.6; }
.spinner {
  width: 26px; height: 26px;
  border: 3px solid var(--border); border-top-color: var(--sidebar-active);
  border-radius: 50%; animation: spin .65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="shell">

  <header class="header">
    <div class="header-logo">🇫🇷 Portail Criminalité × Immigration</div>
    <div class="header-sep"></div>
    <div class="header-crumb" id="hdr-crumb">
      <strong>Criminalité France</strong> — Tableau de bord criminalité générale
    </div>
    <div class="header-count">9 tableaux de bord · 2016–2024</div>
  </header>

  <div class="body">
    <nav class="sidebar">
      <div class="sidebar-title">Navigation</div>
      
    <div class="nav-group">
      <div class="nav-group-label">🚨 Criminalité</div>
      <button class="nav-item active" onclick="load('crimfrance', this)" title="Tableau de bord criminalité générale"><span class="nav-icon">📊</span><span class="nav-text">Criminalité France</span></button>
      <button class="nav-item" onclick="load('natcomplet', this)" title="Panorama complet criminalité × nationalité"><span class="nav-icon">🔍</span><span class="nav-text">Nationalité — panorama</span></button>
      <button class="nav-item" onclick="load('mecnat', this)" title="Analyse ISR des mis en cause"><span class="nav-icon">⚖️</span><span class="nav-text">MEC par nationalité</span></button>
      <button class="nav-item" onclick="load('natdash', this)" title="Répartition des nationalités"><span class="nav-icon">🌍</span><span class="nav-text">Dashboard nationalité</span></button>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">🔗 Immigration × Criminalité</div>
      <button class="nav-item" onclick="load('isr', this)" title="Indice de surreprésentation 2016-2024"><span class="nav-icon">📈</span><span class="nav-text">ISR détaillé</span></button>
      <button class="nav-item" onclick="load('relation', this)" title="Corrélations immigration → MEC"><span class="nav-icon">🔗</span><span class="nav-text">Flux × Criminalité</span></button>
      <button class="nav-item" onclick="load('phase4', this)" title="Immigration × Criminalité × Justice"><span class="nav-icon">🏛️</span><span class="nav-text">Phase 4 — Justice</span></button>
    </div>
    <div class="nav-group">
      <div class="nav-group-label">🗺️ Géographie</div>
      <button class="nav-item" onclick="load('cartes', this)" title="Choroplèthes D3.js par département"><span class="nav-icon">🗺️</span><span class="nav-text">Cartes départementales</span></button>
      <button class="nav-item" onclick="load('chaine', this)" title="Indicateurs pénaux et judiciaires"><span class="nav-icon">⚖️</span><span class="nav-text">Chaîne pénale</span></button>
    </div>
      <div class="sidebar-footer">
        SSMSI · INSEE · DGEF · OFPRA<br>
        Données publiques françaises<br>
        Période 2016–2024
      </div>
    </nav>

    <div class="content">
      <div class="frame-wrap">
        <iframe id="dash-frame" src="criminalite_france_dashboard.html" title="Criminalité France" onload="onLoaded()"></iframe>
      </div>
      <div class="overlay" id="overlay">
        <div class="spinner"></div>
        <div class="overlay-icon" id="ov-icon"></div>
        <div class="overlay-title" id="ov-title"></div>
        <div class="overlay-desc" id="ov-desc"></div>
      </div>
    </div>
  </div>
</div>

<script>
const DASHBOARDS = {
  'crimfrance': { file: 'criminalite_france_dashboard.html', label: 'Criminalité France', desc: 'Tableau de bord criminalité générale', icon: '📊' },
  'natcomplet': { file: 'criminalite_nationalite_complet.html', label: 'Nationalité — panorama', desc: 'Panorama complet criminalité × nationalité', icon: '🔍' },
  'mecnat': { file: 'dashboard_mec_nationalite.html', label: 'MEC par nationalité', desc: 'Analyse ISR des mis en cause', icon: '⚖️' },
  'natdash': { file: 'nationalite_dashboard.html', label: 'Dashboard nationalité', desc: 'Répartition des nationalités', icon: '🌍' },
  'isr': { file: 'dashboard_isr_criminalite_immigration.html', label: 'ISR détaillé', desc: 'Indice de surreprésentation 2016-2024', icon: '📈' },
  'relation': { file: 'dashboard_mise_en_relation.html', label: 'Flux × Criminalité', desc: 'Corrélations immigration → MEC', icon: '🔗' },
  'phase4': { file: 'dashboard_phase4.html', label: 'Phase 4 — Justice', desc: 'Immigration × Criminalité × Justice', icon: '🏛️' },
  'cartes': { file: 'dashboard_cartes_phase4.html', label: 'Cartes départementales', desc: 'Choroplèthes D3.js par département', icon: '🗺️' },
  'chaine': { file: 'dashboard_chaine_penale.html', label: 'Chaîne pénale', desc: 'Indicateurs pénaux et judiciaires', icon: '⚖️' },
};

var current = 'crimfrance';
var loading = false;

function load(id, btn) {
  if (id === current || loading) return;
  var d = DASHBOARDS[id];
  if (!d) return;

  current = id;
  loading = true;

  // Nav state
  document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');

  // Header
  document.getElementById('hdr-crumb').innerHTML =
    '<strong>' + d.label + '</strong> — ' + d.desc;

  // Overlay
  document.getElementById('ov-icon').textContent  = d.icon;
  document.getElementById('ov-title').textContent = d.label;
  document.getElementById('ov-desc').textContent  = d.desc;
  document.getElementById('overlay').classList.add('visible');

  // Load iframe
  document.getElementById('dash-frame').src = d.file;
}

function onLoaded() {
  loading = false;
  document.getElementById('overlay').classList.remove('visible');
}
</script>
</body>
</html>
